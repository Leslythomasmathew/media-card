<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: black;
    color:black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    width: 350px;
    background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
    color: white;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
}

.profile-pic {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #ffffff;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
}

h2 {
    margin-top: 15px;
    font-size: 24px;
    font-weight: 700;
}

.title {
    color: #bfdbfe;
    margin-bottom: 20px;
    font-size: 14px;
}

.about h3 {
    margin-bottom: 8px;
    font-size: 16px;
    color: #ffffff;
}

.about p {
    font-size: 14px;
    color: #e2e8f0;
    margin-bottom: 25px;
    line-height: 1.5;
}

.links {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.links a {
    text-decoration: none;
    color: white;
    padding: 12px;
    border-radius: 10px;
    transition: all 0.3s ease;
    font-weight: 500;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

.links a.github-btn {
    background: #181717;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.links a.github-btn:hover {
    background: #2f2f2f;
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
}

.links a.linkedin-btn {
    background: #0077b5;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.links a.linkedin-btn:hover {
    background: #005f8d;
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
}

.follow-btn {
    margin-top: 25px;
    padding: 12px 30px;
    border: none;
    border-radius: 25px;
    background: #ffffff;
    color: #1e3a8a;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
}

.follow-btn:hover {
    background: #f1f5f9;
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
}
    </style>
</head>

<body>

    <div class="card">
        <img src="profile.png" alt="Profile Picture" class="profile-pic">

        <h2>Lesly Mathew</h2>
        <p class="title">Student ,Data Analyst , Tech Enthusiast</p>

        <div class="about">
            <h3>About Me</h3>
            <p>
                Passionate about data analytics, web development, and learning
                new technologies. Eager to learn  more things.
            </p>
        </div>

        <div class="links">
            <a href="https://github.com/Leslythomasmathew" class="github-btn" target="_blank">GitHub</a>
            <a href="https://www.linkedin.com/in/lesly-mathew-149898327" class="linkedin-btn" target="_blank">LinkedIn</a>
        </div>

        <button class="follow-btn">Follow</button>
    </div>

</body>

</html>
