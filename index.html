<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: black;
    color:black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    width: 350px;
    background: white;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.profile-pic {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #0077b5;
}

h2 {
    margin-top: 10px;
}

.title {
    color: gray;
    margin-bottom: 15px;
}

.about h3 {
    margin-bottom: 8px;
}

.about p {
    font-size: 14px;
    color: #555;
    margin-bottom: 20px;
}

.links {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.links a {
    text-decoration: none;
    color: white;
    background: #0077b5;
    padding: 10px;
    border-radius: 8px;
    transition: 0.3s;
}

.links a:hover {
    background: #005f8d;
}

.follow-btn {
    margin-top: 20px;
    padding: 10px 25px;
    border: none;
    border-radius: 25px;
    background: #28a745;
    color: black;
    cursor: pointer;
    font-size: 16px;
}

.follow-btn:hover {
    background: #218838;
}
    </style>
</head>

<body>

    <div class="card">
        <img src="profile.png" alt="Profile Picture" class="profile-pic">

        <h2>Lesly Mathew</h2>
        <p class="title">Student ,Data Analyst , Tech Enthusiast</p>

        <div class="about">
            <h3>About Me</h3>
            <p>
                Passionate about data analytics, web development, and learning
                new technologies. Eager to learn  more things.
            </p>
        </div>

        <div class="links">
            <a href="https://github.com/Leslythomasmathew" target="_blank">GitHub</a>
            <a href="https://www.linkedin.com/in/lesly-mathew-149898327" target="_blank">LinkedIn</a>
        </div>

        <button class="follow-btn">Follow</button>
    </div>

</body>

</html>
